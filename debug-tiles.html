<!doctype html>
<html>
<head><meta charset="utf-8"><title>debug tiles</title>
<style>body{background:#222;margin:0;font:10px monospace;color:#eee} canvas{image-rendering:pixelated;display:block;margin:10px}</style>
</head>
<body>
<script>
const params = new URLSearchParams(location.search);
const src = params.get('img') || 'assets/env/tileset-cemetery.png';
const img = new Image();
img.onload = () => {
  const scale = 3;
  const c = document.createElement('canvas');
  c.width = (img.width + 60) * scale;
  c.height = (img.height + 30) * scale;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.scale(scale, scale);
  ctx.fillStyle = '#3a3a4a';
  ctx.fillRect(0, 0, img.width + 60, img.height + 30);
  ctx.drawImage(img, 30, 20);
  ctx.strokeStyle = 'rgba(255,80,80,0.5)';
  ctx.lineWidth = 1 / scale;
  ctx.fillStyle = '#ffd040';
  ctx.font = '5px monospace';
  for (let x = 0; x <= img.width; x += 16) {
    ctx.beginPath(); ctx.moveTo(30 + x, 20); ctx.lineTo(30 + x, 20 + img.height); ctx.stroke();
    if (x < img.width) ctx.fillText(String(x / 16), 30 + x + 5, 16);
  }
  for (let y = 0; y <= img.height; y += 16) {
    ctx.beginPath(); ctx.moveTo(30, 20 + y); ctx.lineTo(30 + img.width, 20 + y); ctx.stroke();
    if (y < img.height) ctx.fillText(String(y / 16), 10, 20 + y + 10);
  }
  document.body.appendChild(c);
};
img.src = '/' + src;
</script>
</body>
</html>
